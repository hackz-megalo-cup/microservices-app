version: "2"

linters:
  default: none
  enable:
    # Core (gosimple is merged into staticcheck in v2)
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    # Error handling (Google style)
    - errname
    - errorlint
    # Style
    - revive
    - godot
    - misspell
    - predeclared
    # Complexity & style
    - gocritic
    - nakedret
    - gocognit
    - thelper
    # Quality
    - bodyclose
    - durationcheck
    - nilerr
    - noctx
    - unconvert
    - unparam
    - wastedassign

  settings:
    revive:
      rules:
        - name: unexported-return
          disabled: true
        - name: var-naming
        - name: error-strings
        - name: receiver-naming
        - name: bare-return
        - name: dot-imports
        - name: context-as-argument
    gocognit:
      min-complexity: 30
    godot:
      scope: toplevel
      capital: true

  exclusions:
    paths:
      - gen/
    rules:
      - linters: [errcheck]
        text: "Error return value of .*(Close|Log|Print).*is not checked"

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/thirdlf03/microservice-app
