apiVersion: apps/v1
kind: Deployment
metadata:
  name: caller-service
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: caller
      app.kubernetes.io/version: 0.1.0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: caller
        app.kubernetes.io/version: 0.1.0
    spec:
      containers:
        - env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: DATABASE_URL
                  name: caller-secrets
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  key: KAFKA_BROKERS
                  name: caller-secrets
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4317
            - name: OTEL_SERVICE_NAME
              value: caller-service
            - name: PORT
              value: "8081"
          image: ghcr.io/hackz-megalo-cup/caller:538128242c0b42dd1eb82d031c02b81a51f74c7f
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          name: caller-service
          ports:
            - containerPort: 8081
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 384Mi
            requests:
              cpu: 100m
              memory: 128Mi
