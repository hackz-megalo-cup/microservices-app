apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-lang-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: custom-lang-service
      app.kubernetes.io/version: 0.1.0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: custom-lang-service
        app.kubernetes.io/version: 0.1.0
    spec:
      containers:
        - env:
            - name: DATABASE_URL
              value: postgresql://devuser:devpass@postgresql.database:5432/lang_db
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4317
            - name: OTEL_SERVICE_NAME
              value: custom-lang-service
            - name: PORT
              value: "3000"
          image: custom-lang-service:latest
          imagePullPolicy: Never
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          name: custom-lang-service
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: 100m
              memory: 192Mi
            requests:
              cpu: 25m
              memory: 64Mi
