apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: microservices
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/version: 0.1.0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/version: 0.1.0
    spec:
      containers:
        - env:
            - name: CUSTOM_LANG_BASE_URL
              value: http://custom-lang-service.microservices:3000
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: DATABASE_URL
                  name: gateway-secrets
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  key: KAFKA_BROKERS
                  name: gateway-secrets
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4317
            - name: OTEL_SERVICE_NAME
              value: gateway-service
            - name: PORT
              value: "8082"
          image: ghcr.io/hackz-megalo-cup/gateway:f199b001fc6e9b6605f3c481e06abce5ae93a740
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          name: gateway
          ports:
            - containerPort: 8082
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
      serviceAccountName: gateway
