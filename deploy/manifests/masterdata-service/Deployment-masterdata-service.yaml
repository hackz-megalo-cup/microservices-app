apiVersion: apps/v1
kind: Deployment
metadata:
  name: masterdata-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: masterdata
      app.kubernetes.io/version: 0.1.0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: masterdata
        app.kubernetes.io/version: 0.1.0
    spec:
      containers:
        - env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: DATABASE_URL
                  name: masterdata-secrets
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  key: KAFKA_BROKERS
                  name: masterdata-secrets
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4317
            - name: OTEL_SERVICE_NAME
              value: masterdata-service
            - name: PORT
              value: "8084"
          image: ghcr.io/hackz-megalo-cup/masterdata:186a7353c3cb8ffc0a7ba1c70e29765a3ccd8539
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          name: masterdata-service
          ports:
            - containerPort: 8084
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8084
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
