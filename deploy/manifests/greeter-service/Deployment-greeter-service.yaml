apiVersion: apps/v1
kind: Deployment
metadata:
  name: greeter-service
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: greeter
      app.kubernetes.io/version: 0.1.0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: greeter
        app.kubernetes.io/version: 0.1.0
    spec:
      containers:
        - env:
            - name: CALLER_BASE_URL
              value: http://caller-service.microservices:8081
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: DATABASE_URL
                  name: greeter-secrets
            - name: EXTERNAL_API_URL
              value: https://httpbin.org/get
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  key: KAFKA_BROKERS
                  name: greeter-secrets
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4317
            - name: OTEL_SERVICE_NAME
              value: greeter-service
            - name: PORT
              value: "8080"
          image: ghcr.io/hackz-megalo-cup/greeter:fd49949f5c9cd81842439d21a363850c493a6625
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          name: greeter-service
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 384Mi
            requests:
              cpu: 100m
              memory: 128Mi
