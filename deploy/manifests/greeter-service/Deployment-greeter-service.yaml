apiVersion: apps/v1
kind: Deployment
metadata:
  name: greeter-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: greeter
      app.kubernetes.io/version: 0.1.0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: greeter
        app.kubernetes.io/version: 0.1.0
    spec:
      containers:
        - env:
            - name: CALLER_BASE_URL
              value: http://caller-service.microservices:8081
            - name: DATABASE_URL
              value: postgresql://devuser:devpass@postgresql.database:5432/greeter_db
            - name: EXTERNAL_API_URL
              value: https://httpbin.org/get
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4317
            - name: OTEL_SERVICE_NAME
              value: greeter-service
            - name: PORT
              value: "8080"
          image: greeter:latest
          imagePullPolicy: Never
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          name: greeter-service
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 192Mi
            requests:
              cpu: 50m
              memory: 64Mi
