apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  destination:
    namespace: edge
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./deploy/manifests/traefik
    repoURL: https://github.com/thirdlf03/microservice-app
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
