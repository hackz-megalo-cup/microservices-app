version: v2
clean: true
plugins:
  - local: protoc-gen-go
    out: services/gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: services/gen/go
    opt:
      - paths=source_relative
  - local: frontend/node_modules/.bin/protoc-gen-es
    out: frontend/src/gen
    opt:
      - target=ts
  - local: frontend/node_modules/.bin/protoc-gen-connect-query
    out: frontend/src/gen
    opt:
      - target=ts
  - local: node-services/node_modules/.bin/protoc-gen-es
    out: node-services/gen
    opt:
      - target=js+dts
