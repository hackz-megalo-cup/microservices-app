version: v2
clean: true
plugins:
  - remote: buf.build/protocolbuffers/go
    out: services/gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: services/gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/es
    out: frontend/src/gen
    opt:
      - target=ts
  - remote: buf.build/connectrpc/query-es
    out: frontend/src/gen
    opt:
      - target=ts
