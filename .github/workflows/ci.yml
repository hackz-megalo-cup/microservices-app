name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
      go: ${{ steps.filter.outputs.go }}
      frontend: ${{ steps.filter.outputs.frontend }}
      node: ${{ steps.filter.outputs.node }}
      nix: ${{ steps.filter.outputs.nix }}
      go_shared: ${{ steps.filter.outputs.go_shared }}
      caller: ${{ steps.filter.outputs.caller }}
      gateway: ${{ steps.filter.outputs.gateway }}
      greeter: ${{ steps.filter.outputs.greeter }}
      item: ${{ steps.filter.outputs.item }}
      masterdata: ${{ steps.filter.outputs.masterdata }}
      projector: ${{ steps.filter.outputs.projector }}
      raid_lobby: ${{ steps.filter.outputs.raid_lobby }}
      capture: ${{ steps.filter.outputs.capture }}
      go_binary_attrs: ${{ steps.targets.outputs.go_binary_attrs }}
      image_attrs: ${{ steps.targets.outputs.image_attrs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            proto:
              - 'proto/**'
            go:
              - 'services/**'
              - 'proto/**'
            go_shared:
              - 'services/go.mod'
              - 'services/go.sum'
              - 'services/internal/platform/**'
            caller:
              - 'services/cmd/caller/**'
              - 'services/internal/caller/**'
              - 'proto/caller/**'
              - 'services/gen/go/caller/**'
            gateway:
              - 'services/cmd/gateway/**'
              - 'services/internal/gateway/**'
              - 'proto/gateway/**'
              - 'services/gen/go/gateway/**'
            greeter:
              - 'services/cmd/greeter/**'
              - 'services/internal/greeter/**'
              - 'proto/greeter/**'
              - 'services/gen/go/greeter/**'
            item:
              - 'services/cmd/item/**'
              - 'services/internal/item/**'
              - 'proto/item/**'
              - 'services/gen/go/item/**'
            masterdata:
              - 'services/cmd/masterdata/**'
              - 'services/internal/masterdata/**'
              - 'proto/masterdata/**'
              - 'services/gen/go/masterdata/**'
            projector:
              - 'services/cmd/projector/**'
              - 'services/internal/projector/**'
            raid_lobby:
              - 'services/cmd/raid-lobby/**'
              - 'services/internal/raid_lobby/**'
              - 'proto/raid_lobby/**'
              - 'services/gen/go/raid_lobby/**'
            capture:
              - 'services/cmd/capture/**'
              - 'services/internal/capture/**'
              - 'proto/capture/**'
              - 'services/gen/go/capture/**'
            frontend:
              - 'frontend/**'
            node:
              - 'node-services/**'
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - '**/*.nix'
      - name: Select Nix build targets
        id: targets
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          NIX_CHANGED: ${{ steps.filter.outputs.nix }}
          NODE_CHANGED: ${{ steps.filter.outputs.node }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          GO_SHARED_CHANGED: ${{ steps.filter.outputs.go_shared }}
          CALLER_CHANGED: ${{ steps.filter.outputs.caller }}
          GATEWAY_CHANGED: ${{ steps.filter.outputs.gateway }}
          GREETER_CHANGED: ${{ steps.filter.outputs.greeter }}
          ITEM_CHANGED: ${{ steps.filter.outputs.item }}
          MASTERDATA_CHANGED: ${{ steps.filter.outputs.masterdata }}
          PROJECTOR_CHANGED: ${{ steps.filter.outputs.projector }}
          RAID_LOBBY_CHANGED: ${{ steps.filter.outputs.raid_lobby }}
          CAPTURE_CHANGED: ${{ steps.filter.outputs.capture }}
        run: |
          set -euo pipefail

          go_services=(auth caller gateway greeter item masterdata projector raid-lobby capture)
          release_images=(
            .#auth-image
            .#custom-lang-service-image
            .#frontend-image
            .#caller-image
            .#gateway-image
            .#greeter-image
            .#item-image
            .#masterdata-image
            .#projector-image
            .#raid-lobby-image
            .#capture-image
          )

          declare -A selected_go=()
          declare -A selected_pr_images=()

          add_go() {
            selected_go["$1"]=1
          }

          add_pr_image() {
            selected_pr_images["$1"]=1
          }

          add_all_go() {
            local svc
            for svc in "${go_services[@]}"; do
              add_go "$svc"
            done
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$REF" == "refs/heads/main" || "$NIX_CHANGED" == "true" || "$GO_SHARED_CHANGED" == "true" ]]; then
            add_all_go
          else
            if [[ "$CALLER_CHANGED" == "true" ]]; then
              add_go caller
              add_go greeter
            fi
            if [[ "$GATEWAY_CHANGED" == "true" ]]; then
              add_go gateway
            fi
            if [[ "$GREETER_CHANGED" == "true" ]]; then
              add_go greeter
            fi
            if [[ "$ITEM_CHANGED" == "true" ]]; then
              add_go item
              add_go projector
              add_go capture
            fi
            if [[ "$MASTERDATA_CHANGED" == "true" ]]; then
              add_go masterdata
              add_go raid-lobby
              add_go capture
            fi
            if [[ "$PROJECTOR_CHANGED" == "true" ]]; then
              add_go projector
            fi
            if [[ "$RAID_LOBBY_CHANGED" == "true" ]]; then
              add_go raid-lobby
            fi
            if [[ "$CAPTURE_CHANGED" == "true" ]]; then
              add_go capture
            fi
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$REF" == "refs/heads/main" ]]; then
            {
              echo "go_binary_attrs=.#go-services"
              echo "image_attrs=${release_images[*]}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          go_binary_attrs=()
          for svc in "${go_services[@]}"; do
            if [[ -n "${selected_go[$svc]:-}" ]]; then
              go_binary_attrs+=(".#${svc}")
              add_pr_image ".#${svc}-image"
            fi
          done

          if [[ "$NIX_CHANGED" == "true" || "$NODE_CHANGED" == "true" ]]; then
            add_pr_image .#auth-image
            add_pr_image .#custom-lang-service-image
          fi
          if [[ "$NIX_CHANGED" == "true" || "$FRONTEND_CHANGED" == "true" ]]; then
            add_pr_image .#frontend-image
          fi

          image_attrs=()
          pr_image_order=(
            .#auth-image
            .#custom-lang-service-image
            .#frontend-image
            .#caller-image
            .#gateway-image
            .#greeter-image
            .#item-image
            .#masterdata-image
            .#projector-image
            .#raid-lobby-image
            .#capture-image
          )
          for attr in "${pr_image_order[@]}"; do
            if [[ -n "${selected_pr_images[$attr]:-}" ]]; then
              image_attrs+=("$attr")
            fi
          done

          {
            echo "go_binary_attrs=${go_binary_attrs[*]}"
            echo "image_attrs=${image_attrs[*]}"
          } >> "$GITHUB_OUTPUT"

  contract:
    needs: [changes]
    if: >-
      needs.changes.outputs.proto == 'true'
      && github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Buf lint
        run: buf lint
      - name: Buf breaking
        run: |
          if git cat-file -e main:proto 2>/dev/null; then
            buf breaking --against '.git#branch=main'
          else
            echo "Skipping buf breaking: proto baseline does not exist on main yet"
          fi

  # Consolidated: go-lint + go-test (saves ~1 billable minute per run)
  go-check:
    needs: [changes]
    if: >-
      needs.changes.outputs.go == 'true'
      && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.10
          working-directory: services
      - name: Go test
        run: go test ./...
        working-directory: services

  # Consolidated: frontend-lint + frontend-build (saves ~1 billable minute)
  frontend-check:
    needs: [changes]
    if: >-
      needs.changes.outputs.frontend == 'true'
      && github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Biome check
        run: npx biome check src/
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  # Consolidated: node-lint + node-test (saves ~3 billable minutes)
  node-check:
    needs: [changes]
    if: >-
      needs.changes.outputs.node == 'true'
      && github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node-services/package-lock.json
      - run: npm ci
        working-directory: node-services
      - name: Biome check
        run: npm run lint --workspaces --if-present
        working-directory: node-services
      - name: Vitest
        run: npm test --workspaces --if-present
        working-directory: node-services

  # Nix build: ubuntu-latest for auto, blacksmith for manual dispatch
  nix-build:
    needs: [changes]
    if: >-
      github.event_name != 'pull_request'
      && (
        github.event_name == 'workflow_dispatch'
        || github.ref == 'refs/heads/main'
        || needs.changes.outputs.go == 'true'
        || needs.changes.outputs.node == 'true'
        || needs.changes.outputs.frontend == 'true'
        || needs.changes.outputs.nix == 'true'
      )
    runs-on: ${{ github.event_name == 'workflow_dispatch' && 'blacksmith-2vcpu-ubuntu-2404' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: hackz-megalo-cup
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build Go service binaries
        if: needs.changes.outputs.go_binary_attrs != ''
        run: nix build ${{ needs.changes.outputs.go_binary_attrs }}

      - name: Build service images
        if: needs.changes.outputs.image_attrs != ''
        run: nix build ${{ needs.changes.outputs.image_attrs }}

      - name: Push images to ghcr.io
        if: >-
          (github.ref == 'refs/heads/main' && github.event_name == 'push')
          || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          services=(
            auth-service custom-lang-service
            caller gateway greeter
            frontend
            item masterdata projector raid-lobby
            capture
          )
          export REGISTRY_AUTH_FILE="$RUNNER_TEMP/containers-auth.json"
          echo "$GITHUB_TOKEN" | skopeo login ghcr.io -u ${{ github.actor }} --password-stdin --authfile "$REGISTRY_AUTH_FILE"
          for svc in "${services[@]}"; do
            nix run .#${svc}-image.copyTo -- \
              --authfile "$REGISTRY_AUTH_FILE" \
              docker://ghcr.io/hackz-megalo-cup/${svc}:${{ github.sha }}
            if [ "$GITHUB_REF" = "refs/heads/main" ]; then
              skopeo copy --authfile "$REGISTRY_AUTH_FILE" \
                docker://ghcr.io/hackz-megalo-cup/${svc}:${{ github.sha }} \
                docker://ghcr.io/hackz-megalo-cup/${svc}:latest
            fi
          done

  render-manifests:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [nix-build]
    runs-on: ${{ github.event_name == 'workflow_dispatch' && 'blacksmith-2vcpu-ubuntu-2404' || 'ubuntu-latest' }}
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: hackz-megalo-cup
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Render nixidy manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: bash scripts/gen-manifests.sh prod

      - uses: peter-evans/create-pull-request@v7
        id: cpr
        with:
          commit-message: "chore: render nixidy manifests"
          title: "chore: render nixidy manifests"
          branch: chore/render-manifests
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash
