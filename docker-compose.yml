services:
  traefik:
    image: traefik:v3.6
    ports:
      - "30081:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deploy/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - app
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-db-sync:
    image: postgres:17
    command: ["bash", "/workspace/scripts/manage-service-db.sh", "sync-compose"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/manage-service-db.sh:/workspace/scripts/manage-service-db.sh:ro
      - ./docker-compose.yml:/workspace/docker-compose.yml:ro
    networks:
      - app

  greeter:
    build:
      context: .
      dockerfile: deploy/docker/greeter/Dockerfile
    environment:
      PORT: "8080"
      CALLER_BASE_URL: "http://caller:8081"
      EXTERNAL_API_URL: "https://httpbin.org/get"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/greeter_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "greeter-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.greeter.rule=PathPrefix(`/greeter.v1.GreeterService`)"
      - "traefik.http.routers.greeter.entrypoints=web"
      - "traefik.http.routers.greeter.priority=100"
      - "traefik.http.routers.greeter.middlewares=cors@file,auth@file,rate-limit@file,retry@file"
      - "traefik.http.routers.greeter-v2.rule=PathPrefix(`/greeter.v2.GreeterService`)"
      - "traefik.http.routers.greeter-v2.entrypoints=web"
      - "traefik.http.routers.greeter-v2.priority=100"
      - "traefik.http.routers.greeter-v2.middlewares=cors@file,rate-limit@file"
      - "traefik.http.services.greeter.loadbalancer.server.port=8080"
      - "traefik.http.services.greeter.loadbalancer.server.scheme=h2c"
    networks:
      - app
    depends_on:
      caller:
        condition: service_started
      postgres-db-sync:
        condition: service_completed_successfully

  caller:
    build:
      context: .
      dockerfile: deploy/docker/caller/Dockerfile
    environment:
      PORT: "8081"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/caller_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "caller-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/gateway/Dockerfile
    environment:
      PORT: "8082"
      CUSTOM_LANG_BASE_URL: "http://custom-lang-service:3000"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/gateway_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "gateway-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/gateway.v1.GatewayService`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.priority=100"
      - "traefik.http.routers.gateway.middlewares=cors@file,auth@file,rate-limit@file"
      - "traefik.http.services.gateway.loadbalancer.server.port=8082"
      - "traefik.http.services.gateway.loadbalancer.server.scheme=h2c"
    networks:
      - app
    depends_on:
      custom-lang-service:
        condition: service_started
      postgres-db-sync:
        condition: service_completed_successfully

  custom-lang-service:
    build:
      context: .
      dockerfile: deploy/docker/custom-lang-service/Dockerfile
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/lang_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "custom-lang-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully

  auth-service:
    build:
      context: .
      dockerfile: deploy/docker/auth-service/Dockerfile
    environment:
      PORT: "8090"
      JWT_SECRET: "dev-secret"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/auth_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "auth-service"
      KAFKA_BROKERS: "redpanda:9092"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.priority=90"
      - "traefik.http.routers.auth.middlewares=cors@file,rate-limit@file"
      - "traefik.http.services.auth.loadbalancer.server.port=8090"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully

  projector:
    build:
      context: .
      dockerfile: deploy/docker/projector/Dockerfile
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/gateway_db"
      GREETER_DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/greeter_db?sslmode=disable"
      HEALTH_PORT: "8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redpanda:
        condition: service_healthy
      postgres-db-sync:
        condition: service_completed_successfully
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:30081"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - app

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.10
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr internal://0.0.0.0:8081,external://localhost:18081
      - --pandaproxy-addr internal://0.0.0.0:8082,external://localhost:18082
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.5.3
    ports:
      - "8888:8080"
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  pgdata:
  redpanda_data:
