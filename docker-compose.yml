services:
  traefik:
    image: traefik:v3.6
    ports:
      - "30081:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deploy/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - app
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-db-sync:
    image: postgres:17
    command: ["bash", "/workspace/scripts/manage-service-db.sh", "sync-compose"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/manage-service-db.sh:/workspace/scripts/manage-service-db.sh:ro
      - ./docker-compose.yml:/workspace/docker-compose.yml:ro
    networks:
      - app

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/gateway/Dockerfile
    environment:
      PORT: "8082"
      CUSTOM_LANG_BASE_URL: "http://custom-lang-service:3000"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/gateway_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "gateway-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/gateway.v1.GatewayService`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.priority=100"
      - "traefik.http.routers.gateway.middlewares=cors@file,auth@file,rate-limit@file"
      - "traefik.http.services.gateway.loadbalancer.server.port=8082"
      - "traefik.http.services.gateway.loadbalancer.server.scheme=h2c"
    networks:
      - app
    depends_on:
      custom-lang-service:
        condition: service_started
      postgres-db-sync:
        condition: service_completed_successfully

  custom-lang-service:
    build:
      context: .
      dockerfile: deploy/docker/custom-lang-service/Dockerfile
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/lang_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "custom-lang-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully

  auth-service:
    build:
      context: .
      dockerfile: deploy/docker/auth-service/Dockerfile
    environment:
      PORT: "8090"
      JWT_SECRET: "dev-secret"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/auth_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "auth-service"
      KAFKA_BROKERS: "redpanda:9092"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth.v1.AuthService`) || PathPrefix(`/.well-known`) || Path(`/verify`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.priority=100"
      - "traefik.http.routers.auth.middlewares=cors@file,rate-limit@file"
      - "traefik.http.services.auth.loadbalancer.server.port=8090"
      - "traefik.http.services.auth.loadbalancer.server.scheme=h2c"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully

  projector:
    build:
      context: .
      dockerfile: deploy/docker/projector/Dockerfile
    environment:
      KAFKA_BROKERS: "redpanda:9092"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/gateway_db"
HEALTH_PORT: "8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redpanda:
        condition: service_healthy
      postgres-db-sync:
        condition: service_completed_successfully
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:30081"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - app

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.10
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr internal://0.0.0.0:8081,external://localhost:18081
      - --pandaproxy-addr internal://0.0.0.0:8082,external://localhost:18082
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.5.3
    ports:
      - "8888:8080"
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - app

  item:
    build:
      context: .
      dockerfile: deploy/docker/item/Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/item_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "item-service"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully

  masterdata:
    build:
      context: .
      dockerfile: deploy/docker/masterdata/Dockerfile
    environment:
      PORT: "8084"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/masterdata_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "masterdata-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.item.rule=PathPrefix(`/item.v1.ItemService`)"
      - "traefik.http.routers.item.entrypoints=web"
      - "traefik.http.routers.item.priority=100"
      - "traefik.http.routers.item.middlewares=cors@file,auth@file,rate-limit@file,retry@file"
      - "traefik.http.services.item.loadbalancer.server.port=8080"
      - "traefik.http.services.item.loadbalancer.server.scheme=h2c"
      - "traefik.http.routers.masterdata.rule=PathPrefix(`/masterdata.v1.MasterdataService`)"
      - "traefik.http.routers.masterdata.entrypoints=web"
      - "traefik.http.routers.masterdata.priority=100"
      - "traefik.http.routers.masterdata.middlewares=cors@file,rate-limit@file,retry@file"
      - "traefik.http.services.masterdata.loadbalancer.server.port=8084"
      - "traefik.http.services.masterdata.loadbalancer.server.scheme=h2c"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

  raid-lobby:
    build:
      context: .
      dockerfile: deploy/docker/raid-lobby/Dockerfile
    environment:
      PORT: "8086"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/raid_lobby_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "raid-lobby-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
      MASTERDATA_URL: "http://masterdata:8084"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.raid-lobby.rule=PathPrefix(`/raid_lobby.v1.RaidLobbyService`)"
      - "traefik.http.routers.raid-lobby.entrypoints=web"
      - "traefik.http.routers.raid-lobby.priority=100"
      - "traefik.http.routers.raid-lobby.middlewares=cors@file,rate-limit@file,retry@file"
      - "traefik.http.services.raid-lobby.loadbalancer.server.port=8086"
      - "traefik.http.services.raid-lobby.loadbalancer.server.scheme=h2c"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

  lobby:
    build:
      context: .
      dockerfile: deploy/docker/lobby/Dockerfile
    environment:
      PORT: "8089"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/lobby_db"
      AUTH_URL: "http://auth-service:8090"
      ITEM_URL: "http://item:8080"
      RAID_LOBBY_URL: "http://raid-lobby:8086"
      MASTERDATA_URL: "http://masterdata:8084"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "lobby-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lobby.rule=PathPrefix(`/lobby.v1.LobbyService`)"
      - "traefik.http.routers.lobby.entrypoints=web"
      - "traefik.http.routers.lobby.priority=100"
      - "traefik.http.routers.lobby.middlewares=cors@file,rate-limit@file,retry@file"
      - "traefik.http.services.lobby.loadbalancer.server.port=8089"
      - "traefik.http.services.lobby.loadbalancer.server.scheme=h2c"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

  capture:
    build:
      context: .
      dockerfile: deploy/docker/capture/Dockerfile
    environment:
      PORT: "8088"
      DATABASE_URL: "postgresql://devuser:devpass@postgres:5432/capture_db"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "capture-service"
      KAFKA_BROKERS: "redpanda:9092"
      JWKS_URL: "http://auth-service:8090/.well-known/jwks.json"
      MASTERDATA_URL: "http://masterdata:8084"
      ITEM_URL: "http://item:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.capture.rule=PathPrefix(`/capture.v1.CaptureService`)"
      - "traefik.http.routers.capture.entrypoints=web"
      - "traefik.http.routers.capture.priority=100"
      - "traefik.http.routers.capture.middlewares=cors@file,auth@file,rate-limit@file,retry@file"
      - "traefik.http.services.capture.loadbalancer.server.port=8088"
      - "traefik.http.services.capture.loadbalancer.server.scheme=h2c"
    networks:
      - app
    depends_on:
      postgres-db-sync:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy

networks:
  app:
    driver: bridge

volumes:
  pgdata:
  redpanda_data:
