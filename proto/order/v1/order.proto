syntax = "proto3";

package order.v1;

option go_package = "github.com/hackz-megalo-cup/microservices-app/services/gen/go/order/v1;orderv1";

service OrderService {
  rpc Invoke(OrderRequest) returns (OrderResponse) {}
}

message OrderRequest {
  string input = 1;
}

message OrderResponse {
  string output = 1;
}
