syntax = "proto3";

package masterdata.v1;

option go_package = "github.com/hackz-megalo-cup/microservices-app/services/gen/go/masterdata/v1;masterdatav1";

service MasterdataService {
  rpc CreatePokemon(CreatePokemonRequest) returns (CreatePokemonResponse) {}
  rpc GetPokemon(GetPokemonRequest) returns (GetPokemonResponse) {}
  rpc ListPokemon(ListPokemonRequest) returns (ListPokemonResponse) {}
  rpc UpdatePokemon(UpdatePokemonRequest) returns (UpdatePokemonResponse) {}
  rpc DeletePokemon(DeletePokemonRequest) returns (DeletePokemonResponse) {}

  rpc CreateTypeMatchup(CreateTypeMatchupRequest) returns (CreateTypeMatchupResponse) {}
  rpc ListTypeMatchups(ListTypeMatchupsRequest) returns (ListTypeMatchupsResponse) {}
  rpc UpdateTypeMatchup(UpdateTypeMatchupRequest) returns (UpdateTypeMatchupResponse) {}
  rpc DeleteTypeMatchup(DeleteTypeMatchupRequest) returns (DeleteTypeMatchupResponse) {}

  rpc CreateItem(CreateItemRequest) returns (CreateItemResponse) {}
  rpc GetItem(GetItemRequest) returns (GetItemResponse) {}
  rpc ListItems(ListItemsRequest) returns (ListItemsResponse) {}
  rpc UpdateItem(UpdateItemRequest) returns (UpdateItemResponse) {}
  rpc DeleteItem(DeleteItemRequest) returns (DeleteItemResponse) {}
}

// ─── Pokemon ─────────────────────────────────────────────────

message Pokemon {
  string id = 1;
  string name = 2;
  string type = 3;
  int32 hp = 4;
  int32 attack = 5;
  int32 speed = 6;
  string special_move_name = 7;
  int32 special_move_damage = 8;
}

message CreatePokemonRequest {
  string name = 1;
  string type = 2;
  int32 hp = 3;
  int32 attack = 4;
  int32 speed = 5;
  string special_move_name = 6;
  int32 special_move_damage = 7;
}
message CreatePokemonResponse {
  string id = 1;
}

message GetPokemonRequest {
  string id = 1;
}
message GetPokemonResponse {
  Pokemon pokemon = 1;
}

message ListPokemonRequest {}
message ListPokemonResponse {
  repeated Pokemon pokemon = 1;
}

message UpdatePokemonRequest {
  string id = 1;
  string name = 2;
  string type = 3;
  int32 hp = 4;
  int32 attack = 5;
  int32 speed = 6;
  string special_move_name = 7;
  int32 special_move_damage = 8;
}
message UpdatePokemonResponse {
  Pokemon pokemon = 1;
}

message DeletePokemonRequest {
  string id = 1;
}
message DeletePokemonResponse {}

// ─── TypeMatchup ─────────────────────────────────────────────

message TypeMatchup {
  string attacking_type = 1;
  string defending_type = 2;
  double effectiveness = 3;
}

message CreateTypeMatchupRequest {
  string attacking_type = 1;
  string defending_type = 2;
  double effectiveness = 3;
}
message CreateTypeMatchupResponse {}

message ListTypeMatchupsRequest {}
message ListTypeMatchupsResponse {
  repeated TypeMatchup matchups = 1;
}

message UpdateTypeMatchupRequest {
  string attacking_type = 1;
  string defending_type = 2;
  double effectiveness = 3;
}
message UpdateTypeMatchupResponse {
  TypeMatchup matchup = 1;
}

message DeleteTypeMatchupRequest {
  string attacking_type = 1;
  string defending_type = 2;
}
message DeleteTypeMatchupResponse {}

// ─── Item ────────────────────────────────────────────────────

message ItemEffect {
  string effect_type = 1; // "capture_rate_up" | "escape"
  string target_type = 2; // 対象タイプ。空 = 全タイプに適用
  double capture_rate_bonus = 3;
  string flavor_text = 4; // 例: "ざつくんはPythonが嫌いすぎて群馬に帰った。"
}

message Item {
  string id = 1;
  string name = 2;
  repeated ItemEffect effects = 3;
}

message CreateItemEffectRequest {
  string effect_type = 1;
  string target_type = 2;
  double capture_rate_bonus = 3;
  string flavor_text = 4;
}

message CreateItemRequest {
  string name = 1;
  repeated CreateItemEffectRequest effects = 2;
}
message CreateItemResponse {
  string id = 1;
}

message GetItemRequest {
  string id = 1;
}
message GetItemResponse {
  Item item = 1;
}

message ListItemsRequest {}
message ListItemsResponse {
  repeated Item items = 1;
}

message UpdateItemRequest {
  string id = 1;
  string name = 2;
  repeated CreateItemEffectRequest effects = 3;
}
message UpdateItemResponse {
  Item item = 1;
}

message DeleteItemRequest {
  string id = 1;
}
message DeleteItemResponse {}
