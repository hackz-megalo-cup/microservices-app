syntax = "proto3";

package raid_lobby.v1;

option go_package = "github.com/hackz-megalo-cup/microservices-app/services/gen/go/raid_lobby/v1;raid_lobbyv1";

service RaidLobbyService {
  rpc CreateRaid(CreateRaidRequest) returns (CreateRaidResponse) {}
  rpc JoinRaid(JoinRaidRequest) returns (JoinRaidResponse) {}
  rpc StartBattle(StartBattleRequest) returns (StartBattleResponse) {}
  rpc StreamLobby(StreamLobbyRequest) returns (stream StreamLobbyResponse) {}
  rpc ListOpenRaids(ListOpenRaidsRequest) returns (ListOpenRaidsResponse) {}
}

message CreateRaidRequest {
  string boss_pokemon_id = 1;
}

message CreateRaidResponse {
  string lobby_id = 1;
}

message JoinRaidRequest {
  string lobby_id = 1;
  string user_id = 2;
}

message JoinRaidResponse {
  string participant_id = 1;
}

message StartBattleRequest {
  string lobby_id = 1;
}

message StartBattleResponse {
  string battle_session_id = 1;
}

message StreamLobbyRequest {
  string lobby_id = 1;
}

message StreamLobbyResponse {
  string event_type = 1;
  string lobby_id = 2;
  string payload = 3;
}

message ListOpenRaidsRequest {
  string status_filter = 1; // optional: "waiting", "in_battle", "" (全件)
}

message ListOpenRaidsResponse {
  repeated OpenRaidEntry raids = 1;
}

message OpenRaidEntry {
  string id                   = 1;
  string boss_pokemon_id      = 2;
  int32  current_participants = 3;
  string status               = 4;
  string created_at           = 5;
  int32  max_participants     = 6;
}
